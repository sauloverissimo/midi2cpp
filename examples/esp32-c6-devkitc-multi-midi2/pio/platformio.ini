; midi2_cpp | esp32-c6-devkitc-multi-midi2
;
; ESP32-C6-DevKitC-1 as a wireless MIDI 2.0 endpoint over BLE + ESP-NOW.
; The C6 has no USB-OTG (only USB-Serial-JTAG), so the canonical USB MIDI
; transports are not available. Instead this recipe ships two transports
; in parallel:
;
;   * BLE-MIDI 1.0 (Apple/MIDI Association service UUID), advertised name
;     matches the project Endpoint Name. Provided by ESP32_Host_MIDI v6.0.0
;     BLEConnection.
;   * ESP-NOW peer-to-peer on WiFi channel 1 (broadcast by default).
;     Provided by ESP32_Host_MIDI v6.0.0 ESPNowConnection.
;
; Both transports carry MIDI 1.0 byte streams on the wire (that is what
; the BLE-MIDI spec and the ESP-NOW recipe support natively). Bytes are
; uplifted to UMP MT 0x2 in firmware via midi2_conv (from the midi2 C99
; core pulled through lib_deps) before being handed to the typed
; midi2::Device dispatch path. Outgoing UMP from the showcase loop is
; downgraded back to MIDI 1.0 bytes for the wire side.
;
; No USB device interface is presented; therefore no PID is consumed
; from the project pool. Identity surface is per-transport (BLE service
; UUID + advertised name, ESP-NOW WiFi channel + burned-in MAC).
;
; arduino-esp32 v3.x is required for ESP32-C6 support. The pioarduino
; community fork of platform-espressif32 supplies that core; the
; upstream espressif32 platform stops at the S3 family.

[platformio]
default_envs = esp32c6-devkitc

[env:esp32c6-devkitc]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board           = esp32-c6-devkitc-1
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

board_build.partitions = huge_app.csv

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3

; Pull midi2_cpp from the parent of this recipe via lib_extra_dirs.
; ESP32_Host_MIDI is pinned to the v6.0.1 GitHub tag (no library.json in
; the release, so PlatformIO uses the URL form). v6.0.1 carries the BLE
; fix that always adds BLE2902 and enables scan response, required for
; the GATT service to be visible on NimBLE-Arduino targets (ESP32-C6).
lib_extra_dirs = ../../..

lib_deps =
    sauloverissimo/midi2 @ ^0.3.3
    https://github.com/sauloverissimo/ESP32_Host_MIDI.git#v6.0.1

; Pre-build patch: ESP32_Host_MIDI v6.0.0 ships USB Host transport sources
; under src/, and PlatformIO's LDF compiles every .cpp it finds there.
; ESP32-C6 has no USB-OTG hardware, so usb/usb_host.h does not exist for
; this target and the build aborts on USBConnection.cpp / USBMIDI2Connection.cpp
; before main.cpp is even reached. The script neutralises those two TUs
; with empty bodies; the matching .h headers stay intact and gated by
; ESP32_HOST_MIDI_HAS_USB. Idempotent.
extra_scripts = pre:extra/patch_esp32_host_midi.py
