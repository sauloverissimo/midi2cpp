; midi2cpp | t-display-s3-shield-host-midi2
;
; LilyGo T-Display S3 + LilyGo MIDI Shield V1.1, USB MIDI 2.0 Host with
; on-board ST7789 piano roll visualisation. Uses:
;   * ESP32_Host_MIDI v5.2.1+ (USBMIDI2Connection) for the USB host stack
;     on top of ESP-IDF's native usb_host_* APIs (no TinyUSB on the host
;     side, no PR override). First-class shippable, "official" status.
;   * midi2cpp m2host for typed UMP dispatch, identity tracking, and
;     MIDI-CI Initiator. Pulled from the parent library via lib_extra_dirs.
;   * LovyanGFX v1.2.0 for the ST7789 1.9" 320x170 IPS parallel-8-bit
;     panel; drives the piano_display module bundled in src/.
;
; No PID is consumed: this recipe is host-only, the S3 does not present
; itself as a USB device. The connected device is queried for its
; Endpoint Name, Product Instance ID, Function Blocks, and MUID.

[platformio]
default_envs = lilygo-t-display-s3

[env:lilygo-t-display-s3]
platform        = espressif32@^6.7.0
board           = lilygo-t-display-s3
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; T-Display S3 has no on-board USB-to-UART bridge. Console goes through
; the ESP32-S3 USB-Serial-JTAG endpoint (the same single USB-C as the
; flash path), or to UART0 (GP43 TX / GP44 RX) on the side header for
; an external USB-TTL adapter. The Shield does not bring a UART bridge
; either; both options stay valid.

board_build.psram_type    = opi
board_build.flash_mode    = qio
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216

build_unflags =
    -std=gnu++11
    -DARDUINO_USB_CDC_ON_BOOT=1

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DESP32_HOST_MIDI_NO_USB_HOST
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DLGFX_USE_V1

; Pull midi2cpp from the parent of this recipe via lib_extra_dirs.
; ESP32_Host_MIDI is pulled from PlatformIO Registry once v6.0 ships;
; until then, drop a checkout next to the project root or extend
; lib_extra_dirs locally.
lib_extra_dirs = ../../..

lib_deps =
    sauloverissimo/midi2 @ ^0.4.0
    ESP32_Host_MIDI
    lovyan03/LovyanGFX@^1.2.0
