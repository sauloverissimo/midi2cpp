; midi2cpp | esp32-s3-devkitc-host-midi2
;
; ESP32-S3-DevKitC-1 as a USB MIDI 2.0 Host using:
;   * ESP32_Host_MIDI v6.0.0 (USBMIDI2Connection) for the USB host stack +
;     alt-walk + Endpoint Discovery + UMP RX/TX, on top of ESP-IDF's native
;     usb_host_* APIs (no TinyUSB on the host side, no PR override).
;     v6.0 makes transports opt-in; only USBMIDI2Connection.h is pulled here,
;     no USB Host MIDI 1.0, no BLE, no compile cost for unused transports.
;   * midi2cpp m2host for typed UMP dispatch, identity tracking, and
;     MIDI-CI Initiator. Pulled from the parent library via lib_extra_dirs.
;
; No PID is consumed: this recipe is host-only, the S3 does not present
; itself as a USB device. The connected device is queried for its
; Endpoint Name, Product Instance ID, Function Blocks, and MUID.

[platformio]
default_envs = esp32s3-devkitc

[env:esp32s3-devkitc]
platform        = espressif32@^6.7.0
board           = esp32-s3-devkitc-1
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3

; Pull midi2cpp from the parent of this recipe via lib_extra_dirs.
; ESP32_Host_MIDI is pinned to the v6.0.0 GitHub tag (no library.json in the
; release, so PlatformIO uses the URL form).
lib_extra_dirs = ../../..

lib_deps =
    sauloverissimo/midi2 @ ^0.3.4
    https://github.com/sauloverissimo/ESP32_Host_MIDI.git#v6.0.0
