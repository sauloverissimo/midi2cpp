## Managed dependencies for esp32-p4-devkit-bridge-midi2.
##
## TinyUSB (coexistence fork) is NOT listed here because ESP-IDF's built-in
## tinyusb is overridden by a local copy in ../components/tinyusb. Run
## ./scripts/fetch_tinyusb.sh once to clone the fork at the pinned SHA.
dependencies:
  idf: ">=5.4"
