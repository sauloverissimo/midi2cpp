## Managed dependencies for t-display-s3-midi2 main component.
##
## TinyUSB (PR #3738, merged upstream) is NOT listed here because ESP-IDF's built-in
## tinyusb is overridden by a local shim in ../components/tinyusb. Run
## ./scripts/fetch_tinyusb.sh once to clone TinyUSB upstream (PR #3738).
##
## LovyanGFX is a dependency of the piano_display component, not main;
## see ../components/piano_display/idf_component.yml.
dependencies:
  idf: ">=5.4"
