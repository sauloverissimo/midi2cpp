name=midi2cpp
version=0.3.1
author=Saulo Verissimo <sauloverissimo@gmail.com>
maintainer=Saulo Verissimo <sauloverissimo@gmail.com>
sentence=C++17 Arduino-style wrapper for MIDI 2.0 on embedded devices.
paragraph=Thin C++ wrapper over the portable midi2 C99 library. Covers UMP transport (M2-104), MIDI-CI with Appendix E (M2-101), Property Exchange Subscribe/Notify, Profile Configuration, Process Inquiry, Flex Data, and Bit Scaling (M2-115). Targets embedded boards (RP2040, RP2350, Teensy, ESP32 family, nRF52, SAMD21).
category=Communication
url=https://github.com/sauloverissimo/midi2cpp
architectures=*
includes=midi2cpp.h
depends=midi2 (>=0.3.4)
